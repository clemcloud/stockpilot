apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: stockpilot-hpa
  namespace: stockpilot
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: stockpilot
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70