version: "3.9"

services:
  db:
    image: postgres:16
    container_name: stockpilot-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: clement
      POSTGRES_DB: stockpilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: stockpilot-app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:clement@db:5432/stockpilot
      - SECRET_KEY=${SECRET_KEY}
      - AWS_REGION=${AWS_REGION}
      - SNS_TOPIC_ARN=${SNS_TOPIC_ARN}
      - SES_SENDER_EMAIL=${SES_SENDER_EMAIL}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
    depends_on:
      - db

volumes:
  postgres_data: