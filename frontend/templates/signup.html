<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockPilot | Register Console</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-[#0b0f19] text-[#e2e8f0] min-h-screen flex items-center justify-center p-4">

    <div
        class="w-full max-w-md bg-[#111827]/60 border border-slate-800 backdrop-blur-xl p-8 rounded-3xl shadow-2xl shadow-black/40">

        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold tracking-tight text-white uppercase flex items-center justify-center gap-2">
                <i class="fa-solid fa-user-plus text-blue-500"></i> StockPilot
            </h1>
            <p class="text-xs text-slate-500 mt-2">Initialize administrator credentials for warehouse control.</p>
        </div>

        <div id="alertBox" class="hidden mb-4 p-3 rounded-xl border text-xs font-medium text-center transition-all">
        </div>

        <form id="signupForm" class="space-y-5">
            <div>
                <label
                    class="block text-[11px] font-medium text-slate-400 uppercase tracking-wider mb-1.5">Username</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-600"><i
                            class="fa-solid fa-user"></i></span>
                    <input type="text" id="username" required autocomplete="off"
                        class="w-full pl-10 pr-4 py-2.5 bg-slate-900 border border-slate-800 rounded-xl text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-blue-500 transition-all"
                        placeholder="e.g., admin_umoru">
                </div>
            </div>

            <div>
                <label class="block text-[11px] font-medium text-slate-400 uppercase tracking-wider mb-1.5">Email
                    Address</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-600"><i
                            class="fa-solid fa-envelope"></i></span>
                    <input type="email" id="email" required autocomplete="off"
                        class="w-full pl-10 pr-4 py-2.5 bg-slate-900 border border-slate-800 rounded-xl text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-blue-500 transition-all"
                        placeholder="name@company.com">
                </div>
            </div>

            <div>
                <label class="block text-[11px] font-medium text-slate-400 uppercase tracking-wider mb-1.5">Security
                    Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-600"><i
                            class="fa-solid fa-lock"></i></span>
                    <input type="password" id="password" required
                        class="w-full pl-10 pr-4 py-2.5 bg-slate-900 border border-slate-800 rounded-xl text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-blue-500 transition-all"
                        placeholder="••••••••">
                </div>
            </div>

            <button type="submit"
                class="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold text-xs rounded-xl uppercase tracking-wider cursor-pointer transition-all shadow-lg shadow-blue-600/10 mt-2">
                Provision Account
            </button>
        </form>

        <div class="text-center mt-6 pt-4 border-t border-slate-900">
            <p class="text-xs text-slate-500">
                Already registered?
                <a href="/" class="text-blue-500 hover:underline font-medium ml-1">Access Terminal</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const alertBox = document.getElementById('alertBox');
            const payload = {
                username: document.getElementById('username').value.trim(),
                email: document.getElementById('email').value.trim(),
                password: document.getElementById('password').value
            };

            try {
                // Hits your existing POST /users route directly
                const response = await fetch('/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.status === 201 || response.ok) {
                    alertBox.className = "mb-4 p-3 rounded-xl border text-xs font-medium text-center bg-emerald-950/40 border-emerald-900/50 text-emerald-400";
                    alertBox.textContent = "Account database record initialized successfully! Redirecting...";
                    alertBox.classList.remove('hidden');

                    setTimeout(() => {
                        window.location.href = '/';
                    }, 2000);
                } else {
                    alertBox.className = "mb-4 p-3 rounded-xl border text-xs font-medium text-center bg-red-950/40 border-red-900/50 text-red-400";
                    alertBox.textContent = data.detail || "Account provisioning rejected.";
                    alertBox.classList.remove('hidden');
                }
            } catch (err) {
                alertBox.className = "mb-4 p-3 rounded-xl border text-xs font-medium text-center bg-red-950/40 border-red-900/50 text-red-400";
                alertBox.textContent = "Network error connecting to auth host node.";
                alertBox.classList.remove('hidden');
            }
        });
    </script>
</body>

</html>
