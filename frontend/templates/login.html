<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockPilot — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <span class="auth-icon">📦</span>
                <h1 class="auth-title">StockPilot</h1>
                <p class="auth-subtitle">Sign in to your workspace</p>
            </div>

            <div id="error-message" class="alert alert-error" style="display:none;"></div>

            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" id="username" class="form-input" placeholder="Enter your username" required />
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Enter your password"
                        required />
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
                    Sign In
                </button>
            </form>

            <div class="auth-footer"
                style="margin-top: 1.5rem; text-align: center; font-size: 0.85rem; color: #64748b;">
                Don't have an account?
                <a href="/signup-page" class="auth-link"
                    style="color: #3b82f6; text-decoration: none; font-weight: 500; margin-left: 0.25rem;">Create Admin
                    Profile</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const error = document.getElementById('error-message');
            btn.textContent = 'Signing in...';
            btn.disabled = true;
            error.style.display = 'none';

            const formData = new FormData();
            formData.append('username', document.getElementById('username').value);
            formData.append('password', document.getElementById('password').value);

            try {
                const res = await fetch('/auth/login', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.access_token);
                    window.location.href = '/dashboard';
                } else {
                    error.textContent = data.detail || 'Invalid credentials';
                    error.style.display = 'block';
                    btn.textContent = 'Sign In';
                    btn.disabled = false;
                }
            } catch (err) {
                error.textContent = 'Something went wrong. Try again.';
                error.style.display = 'block';
                btn.textContent = 'Sign In';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
